name: Release desktop app

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.validate.outputs.version }}
      tag: v${{ steps.validate.outputs.version }}
    steps:
      - name: Validate version
        id: validate
        shell: bash
        run: |
          version="${{ inputs.version }}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([+-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Version must be SemVer like 0.1.0" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

  release:
    name: Build ${{ matrix.name }}
    needs: prepare
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            platform: macos-latest
            rust-target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          - name: macOS Intel
            platform: macos-latest
            rust-target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
          - name: Windows
            platform: windows-latest
            rust-target: x86_64-pc-windows-msvc
            args: --no-sign --bundles nsis

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
          cache-on-failure: true

      - name: Test Rust workspace
        run: cargo test --workspace --locked

      - name: Set release version
        shell: bash
        run: |
          node <<'NODE'
          const fs = require("fs");
          const version = process.env.RELEASE_VERSION;

          const tauriConfigPath = "src/CheckPo.Tauri/src-tauri/tauri.conf.json";
          const tauriConfig = JSON.parse(fs.readFileSync(tauriConfigPath, "utf8"));
          tauriConfig.version = version;
          fs.writeFileSync(tauriConfigPath, `${JSON.stringify(tauriConfig, null, 2)}\n`);

          const files = [
            "Cargo.toml",
            "src/CheckPo.Tauri/src-tauri/Cargo.toml",
          ];
          for (const file of files) {
            let text = fs.readFileSync(file, "utf8");
            text = text.replace(/(^version\s*=\s*")[^"]+(")/m, `$1${version}$2`);
            fs.writeFileSync(file, text);
          }
          NODE
        env:
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}

      - name: Validate updater signing secret
        shell: bash
        run: |
          if [[ -z "${TAURI_SIGNING_PRIVATE_KEY:-}" ]]; then
            echo "TAURI_SIGNING_PRIVATE_KEY secret is required for Tauri updater artifacts." >&2
            exit 1
          fi
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0.0" --locked

      - name: Build, upload assets, and create draft release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: src/CheckPo.Tauri/src-tauri
          tauriScript: cargo tauri
          tagName: ${{ needs.prepare.outputs.tag }}
          releaseName: CheckPo v${{ needs.prepare.outputs.version }}
          releaseDraft: true
          prerelease: false
          uploadUpdaterJson: true
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}

  publish:
    name: Publish release
    needs:
      - prepare
      - release
    runs-on: ubuntu-latest
    steps:
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ needs.prepare.outputs.tag }}
        run: gh release edit "$TAG_NAME" --draft=false
